version: "3.9"

# ============================================================
# Bifrost Trade — Production Docker Compose
# 使用方式: cp .env.example .env && docker compose up -d
# ============================================================

x-python-common: &python-common
  env_file: .env
  restart: unless-stopped
  networks:
    - bifrost-net

x-api-build: &api-build
  build:
    context: ../bifrost-trade-api
    args:
      BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
      BIFROST_WORKER_REF: ${BIFROST_WORKER_REF:-main}
      BIFROST_SOCKET_REF: ${BIFROST_SOCKET_REF:-main}
      GITHUB_ORG: ${GITHUB_ORG}
  <<: *python-common

services:

  # ── 基础设施 ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bifrost-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bifrost-net
    restart: unless-stopped

  # ── 交易核心 daemon ───────────────────────────────────────

  engine:
    build:
      context: ../bifrost-trade-core
    command: python scripts/run_engine.py
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    <<: *python-common

  # ── IB 边缘服务 ───────────────────────────────────────────

  ib-ingestor:
    build:
      context: ../bifrost-trade-ib-edge
      args:
        BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
        GITHUB_ORG: ${GITHUB_ORG}
    command: python scripts/run_ingestor.py
    volumes:
      - ./config:/app/config:ro
    depends_on:
      redis: { condition: service_healthy }
    <<: *python-common

  ib-account-agent:
    build:
      context: ../bifrost-trade-ib-edge
      args:
        BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
        GITHUB_ORG: ${GITHUB_ORG}
    command: python scripts/run_account_agent.py
    volumes:
      - ./config:/app/config:ro
    depends_on:
      redis: { condition: service_healthy }
    <<: *python-common

  ib-operator:
    build:
      context: ../bifrost-trade-ib-edge
      args:
        BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
        GITHUB_ORG: ${GITHUB_ORG}
    command: python scripts/run_operator.py
    volumes:
      - ./config:/app/config:ro
    depends_on:
      redis: { condition: service_healthy }
    <<: *python-common

  # ── FastAPI 后端 (9 个域) ─────────────────────────────────

  api-monitor:
    <<: *api-build
    command: python scripts/run_server.py monitor
    ports: ["${PORT_MONITOR}:${PORT_MONITOR}"]
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres: { condition: service_healthy }

  api-massive:
    <<: *api-build
    command: python scripts/run_server.py massive
    ports: ["${PORT_MASSIVE}:${PORT_MASSIVE}"]
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres: { condition: service_healthy }

  api-docs:
    <<: *api-build
    command: python scripts/run_server.py docs
    ports: ["${PORT_DOCS}:${PORT_DOCS}"]
    volumes:
      - ./config:/app/config:ro

  api-ops:
    <<: *api-build
    command: python scripts/run_server.py ops
    ports: ["${PORT_OPS}:${PORT_OPS}"]
    volumes:
      - ./config:/app/config:ro
    depends_on:
      redis: { condition: service_healthy }

  api-trading:
    <<: *api-build
    command: python scripts/run_server.py trading
    ports: ["${PORT_TRADING}:${PORT_TRADING}"]
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres: { condition: service_healthy }

  api-strategy:
    <<: *api-build
    command: python scripts/run_server.py strategy
    ports: ["${PORT_STRATEGY}:${PORT_STRATEGY}"]
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres: { condition: service_healthy }

  api-portfolio:
    <<: *api-build
    command: python scripts/run_server.py portfolio
    ports: ["${PORT_PORTFOLIO}:${PORT_PORTFOLIO}"]
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres: { condition: service_healthy }

  api-market:
    <<: *api-build
    command: python scripts/run_server.py market
    ports: ["${PORT_MARKET}:${PORT_MARKET}"]
    volumes:
      - ./config:/app/config:ro
    depends_on:
      redis: { condition: service_healthy }

  api-research:
    <<: *api-build
    command: python scripts/run_server.py research
    ports: ["${PORT_RESEARCH}:${PORT_RESEARCH}"]
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres: { condition: service_healthy }

  # ── 数据管道 ──────────────────────────────────────────────

  celery-worker:
    build:
      context: ../bifrost-trade-data
      args:
        BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
        GITHUB_ORG: ${GITHUB_ORG}
    command: python scripts/run_celery.py
    volumes:
      - ./config:/app/config:ro
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    <<: *python-common

  flower:
    build:
      context: ../bifrost-trade-data
      args:
        BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
        GITHUB_ORG: ${GITHUB_ORG}
    command: python scripts/run_flower.py
    ports: ["5555:5555"]
    depends_on:
      redis: { condition: service_healthy }
    <<: *python-common

  # ── 研究流水线 ────────────────────────────────────────────

  research-worker:
    build:
      context: ../bifrost-trade-research
      args:
        BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
        GITHUB_ORG: ${GITHUB_ORG}
    command: python scripts/run_research_api.py
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres: { condition: service_healthy }
    <<: *python-common

  # ── 前端 ──────────────────────────────────────────────────

  frontend:
    build:
      context: ../bifrost-trade-frontend
    ports: ["${PORT_FRONTEND:-80}:80"]
    depends_on:
      - api-monitor
    networks:
      - bifrost-net
    restart: unless-stopped

  # ── 反向代理 ──────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - api-monitor
    networks:
      - bifrost-net
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  bifrost-net:
    driver: bridge
