# ============================================================
# Bifrost Trade — Production Docker Compose (Phase 2C)
# 使用方式: cp .env.example .env && make sync-prod-config && make prod-preflight
#
# PG/Redis 默认外置（LAN，见 config.prod.yaml）；仅 greenfield/CI:
#   docker compose --profile embedded-infra up -d
# ============================================================

x-python-common: &python-common
  env_file: .env
  environment:
    BIFROST_ENV: prod
    BIFROST_CONFIG: /app/config/config.prod.yaml
  restart: unless-stopped
  networks:
    - bifrost-net
  volumes:
    - ./config:/app/config:ro

x-api-build: &api-build
  build:
    context: ../bifrost-trade-api
    args:
      BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
      BIFROST_WORKER_REF: ${BIFROST_WORKER_REF:-main}
      BIFROST_SOCKET_REF: ${BIFROST_SOCKET_REF:-main}
      GITHUB_ORG: ${GITHUB_ORG}
  <<: *python-common

x-worker-build: &worker-build
  build:
    context: ../bifrost-trade-worker
    args:
      BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
      GITHUB_ORG: ${GITHUB_ORG}
  <<: *python-common

x-socket-build: &socket-build
  build:
    context: ../bifrost-trade-socket
    args:
      BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
      GITHUB_ORG: ${GITHUB_ORG}
  <<: *python-common

services:

  # ── 可选内嵌基础设施（默认不启；生产连 LAN PG/Redis）────────

  postgres:
    profiles: [embedded-infra]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bifrost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bifrost_prod}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bifrost}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bifrost-net
    restart: unless-stopped

  redis:
    profiles: [embedded-infra]
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bifrost-net
    restart: unless-stopped

  # ── 交易 daemon ───────────────────────────────────────────

  daemon:
    <<: *worker-build
    command: python scripts/run_daemon.py

  # ── IB / Massive socket 边缘 ──────────────────────────────

  ib-ingestor:
    <<: *socket-build
    command: python scripts/run_ib_ingestor.py

  ib-account-agent:
    <<: *socket-build
    command: python scripts/run_ib_account_agent.py

  ib-operator:
    <<: *socket-build
    command: python scripts/run_ib_operator.py

  massive-ws:
    <<: *socket-build
    command: python scripts/run_massive_ws.py

  # ── FastAPI 后端 (9 个域) ─────────────────────────────────

  api-monitor:
    <<: *api-build
    command: python scripts/run_server.py monitor

  api-massive:
    <<: *api-build
    command: python scripts/run_server.py massive

  api-docs:
    <<: *api-build
    command: python scripts/run_server.py docs

  api-ops:
    build:
      context: ../bifrost-trade-api
      dockerfile: Dockerfile.ops
      args:
        BIFROST_CORE_REF: ${BIFROST_CORE_REF:-main}
        BIFROST_WORKER_REF: ${BIFROST_WORKER_REF:-main}
        BIFROST_SOCKET_REF: ${BIFROST_SOCKET_REF:-main}
        GITHUB_ORG: ${GITHUB_ORG}
    <<: *python-common
    command: python scripts/run_server.py ops
    volumes:
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - .:/infra:ro
    environment:
      BIFROST_ENV: prod
      BIFROST_CONFIG: /app/config/config.prod.yaml
      BIFROST_COMPOSE_WORKDIR: /infra
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-bifrost-trade-infra}

  api-trading:
    <<: *api-build
    command: python scripts/run_server.py trading

  api-strategy:
    <<: *api-build
    command: python scripts/run_server.py strategy

  api-portfolio:
    <<: *api-build
    command: python scripts/run_server.py portfolio

  api-market:
    <<: *api-build
    command: python scripts/run_server.py market

  api-research:
    <<: *api-build
    command: python scripts/run_server.py research

  # ── Celery + Flower ───────────────────────────────────────

  celery-worker:
    <<: *worker-build
    command: python scripts/run_celery.py

  flower:
    <<: *worker-build
    command: >
      celery -A bifrost_worker.celery.celery_app flower
      --port=5555 --address=0.0.0.0
    ports:
      - "5555:5555"

  # ── 前端（仅内部网络；对外入口为 nginx）────────────────────

  frontend:
    build:
      context: ../bifrost-trade-frontend
    depends_on:
      - api-monitor
    networks:
      - bifrost-net
    restart: unless-stopped

  # ── 反向代理（统一入口 :80）──────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - api-monitor
      - api-market
    networks:
      - bifrost-net
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  bifrost-net:
    driver: bridge
