apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: data

resources:
  - namespace.yaml
  - cluster.yaml
  - databases.yaml
  - postgres-nodeport.yaml
  - backup-scheduled.yaml
  - minio/pvc.yaml
  - minio/deployment.yaml
  - minio/service.yaml
  - redis/

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: bifrost
    includeSelectors: false
