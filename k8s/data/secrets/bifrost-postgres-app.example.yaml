# App role credentials for CloudNativePG cluster bifrost-postgres.
# Copy to bifrost-postgres-app.yaml (gitignored) or let install-data-layer-phase0.sh create from env.
#
#   export BIFROST_PG_APP_PASSWORD='bifrost_stg'
#   make k3s-install-data-layer-phase0
apiVersion: v1
kind: Secret
metadata:
  name: bifrost-postgres-app
  namespace: data
  labels:
    app.kubernetes.io/part-of: bifrost
    app.kubernetes.io/component: postgres
type: kubernetes.io/basic-auth
stringData:
  username: bifrost
  password: CHANGE_ME
