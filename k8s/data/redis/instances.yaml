# Phase ⑥ — Redis live/queue targets @ data NS (single-replica; upgrade to Bitnami HA later).
# Names must match platform-api redisTargetCatalog (redis_status.go).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-live-stg
  labels:
    app.kubernetes.io/name: redis-live-stg
    bifrost.io/environment: stg
    bifrost.io/redis-role: live
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-live-stg
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-live-stg
        bifrost.io/environment: stg
        bifrost.io/redis-role: live
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-live-stg
  labels:
    app.kubernetes.io/name: redis-live-stg
spec:
  selector:
    app.kubernetes.io/name: redis-live-stg
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
