  name: redis-dev-ingress
  labels:
    app.kubernetes.io/name: redis-dev
    bifrost.io/environment: dev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis-dev
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bifrost-dev
      ports:
        - protocol: TCP
          port: 6379
