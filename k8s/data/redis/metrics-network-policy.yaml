# Allow Prometheus (monitoring NS) to scrape redis_exporter sidecars on :9121.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-metrics-ingress
  labels:
    app.kubernetes.io/component: redis
spec:
  podSelector:
    matchExpressions:
      - key: bifrost.io/redis-role
        operator: Exists
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9121
