# Phase B stg v2 — trading daemon, account sync, Celery worker (shared bifrost-worker:stg image).
# W8 trade-k8s-native: daemon Deployment uses K8s Lease (R-DV3) — replicas:2 hot standby,
# only the Lease holder runs the GsTrading FSM loop.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: daemon
  labels:
    app.kubernetes.io/name: daemon
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daemon
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: daemon-worker  # Lease RBAC (daemon-rbac.yaml)
      volumes:
        - name: bifrost-config
          configMap:
            name: bifrost-config
      # W7: do not start the FSM trading loop before CNPG + Redis (live + queue) are Ready.
      initContainers:
        - name: wait-for-data
          image: registry.cicd.svc.cluster.local:5000/bifrost-worker:stg
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/wait_for_data.py", "--queue"]
          workingDir: /src/bifrost-trade-worker
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
      containers:
        - name: daemon
          image: registry.cicd.svc.cluster.local:5000/bifrost-worker:stg
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/run_daemon.py"]
          workingDir: /src/bifrost-trade-worker
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
            # W8: K8s Lease active-standby — only the holder runs auto-trade FSM (R-DV3).
            - name: BIFROST_DAEMON_LEASE_ENABLED
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - secretRef:
                name: bifrost-stg-secrets
                optional: true
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
            - name: bifrost-config
              mountPath: /app/config/config.yaml.example
              subPath: config.yaml.example
          readinessProbe:
            exec:
              command: ["python", "scripts/wait_for_data.py", "--queue", "--once"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-sync
  labels:
    app.kubernetes.io/name: account-sync
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: account-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: account-sync
        app.kubernetes.io/component: worker
    spec:
      volumes:
        - name: bifrost-config
          configMap:
            name: bifrost-config
      # W7: wait for CNPG + Redis before account sync starts writing.
      initContainers:
        - name: wait-for-data
          image: registry.cicd.svc.cluster.local:5000/bifrost-worker:stg
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/wait_for_data.py"]
          workingDir: /src/bifrost-trade-worker
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
      containers:
        - name: account-sync
          image: registry.cicd.svc.cluster.local:5000/bifrost-worker:stg
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/run_account_sync_daemon.py"]
          workingDir: /src/bifrost-trade-worker
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
          envFrom:
            - secretRef:
                name: bifrost-stg-secrets
                optional: true
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
          readinessProbe:
            exec:
              command: ["python", "scripts/wait_for_data.py", "--once"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  labels:
    app.kubernetes.io/name: celery-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: celery-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: celery-worker
        app.kubernetes.io/component: worker
    spec:
      volumes:
        - name: bifrost-config
          configMap:
            name: bifrost-config
      # W7: Celery broker (redis_queue) + result/data stores must be Ready before workers boot.
      initContainers:
        - name: wait-for-data
          image: registry.cicd.svc.cluster.local:5000/bifrost-worker:stg
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/wait_for_data.py", "--queue"]
          workingDir: /src/bifrost-trade-worker
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
      containers:
        - name: celery-worker
          image: registry.cicd.svc.cluster.local:5000/bifrost-worker:stg
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/run_celery.py"]
          workingDir: /src/bifrost-trade-worker
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
          envFrom:
            - secretRef:
                name: bifrost-stg-secrets
                optional: true
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
          readinessProbe:
            exec:
              command: ["python", "scripts/wait_for_data.py", "--queue", "--once"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
# W10 trade-k8s-native — Flower Celery monitoring UI (Compose parity :5555).
apiVersion: v1
kind: Service
metadata:
  name: flower
  labels:
    app.kubernetes.io/name: flower
    app.kubernetes.io/component: worker
spec:
  selector:
    app.kubernetes.io/name: flower
  ports:
    - name: http
      port: 5555
      targetPort: 5555
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower
  labels:
    app.kubernetes.io/name: flower
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flower
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flower
        app.kubernetes.io/component: worker
    spec:
      volumes:
        - name: bifrost-config
          configMap:
            name: bifrost-config
      containers:
        - name: flower
          image: registry.cicd.svc.cluster.local:5000/bifrost-worker:stg
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - bifrost_worker.celery.celery_app
            - flower
            - --port=5555
            - --address=0.0.0.0
          workingDir: /src/bifrost-trade-worker
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
            # Override K8s Service-linked FLOWER_PORT=tcp://… (breaks flower CLI).
            - name: FLOWER_PORT
              value: "5555"
          envFrom:
            - secretRef:
                name: bifrost-stg-secrets
                optional: true
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
          ports:
            - containerPort: 5555
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 5555
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
