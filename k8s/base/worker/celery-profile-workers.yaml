# W3 trade-celery-k8s-ideal — per-queue Celery Deployments matching ops.worker_profiles.
# Profile key → Deployment name: stocks_ib → celery-worker-stocks-ib (underscores → dashes).
# Conservative STG defaults: base queues replicas=1; *_high replicas=0 (scale via Ops).
# The legacy monolith Deployment `celery-worker` is kept at replicas=0 (see manifest.yaml).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-stocks-ib
  labels:
    app.kubernetes.io/name: celery-worker-stocks-ib
    app.kubernetes.io/component: celery
    bifrost.io/celery-profile: stocks_ib
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: celery-worker-stocks-ib
  template:
    metadata:
      labels:
        app.kubernetes.io/name: celery-worker-stocks-ib
        app.kubernetes.io/component: celery
        bifrost.io/celery-profile: stocks_ib
    spec:
      volumes:
        - name: bifrost-config
          configMap:
            name: bifrost-config
      initContainers:
        - name: wait-for-data
          image: registry.cicd.svc.cluster.local:5000/bifrost-worker:stg
          imagePullPolicy: Always
          command: ["python", "scripts/wait_for_data.py", "--queue"]
          workingDir: /src/bifrost-trade-worker
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
      containers:
        - name: celery-worker
          image: registry.cicd.svc.cluster.local:5000/bifrost-worker:stg
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/systemd/run_celery.py", "--instance", "stocks_ib-1"]
          workingDir: /src/bifrost-trade-worker
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
          envFrom:
            - secretRef:
                name: bifrost-stg-secrets
                optional: true
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
          readinessProbe:
            exec:
              command: ["python", "scripts/wait_for_data.py", "--queue", "--once"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
