---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-monitor
  labels:
    app.kubernetes.io/name: api-monitor
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: bifrost-trade
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-monitor
        app.kubernetes.io/component: api
    spec:
      volumes:
        - name: bifrost-config
          configMap:
            name: bifrost-config
      containers:
        - name: api-monitor
          image: registry.cicd.svc.cluster.local:5000/bifrost-api-monitor:stg
          imagePullPolicy: IfNotPresent
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
            - name: API_DOMAIN
              value: monitor
          ports:
            - name: http
              containerPort: 8765
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-monitor
  labels:
    app.kubernetes.io/name: api-monitor
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: bifrost-trade
spec:
  selector:
    app.kubernetes.io/name: api-monitor
  ports:
    - name: http
      port: 8765
      targetPort: http
