# Phase B stg v2 — Massive WS only (Polygon; no IB clientId).
#
# Legacy trade-socket IB StatefulSets (ib-market-gateway / ib-account-agent / ib-operator)
# retired IBGP3 — Platform ib-gateway @ data/redis-ib is the sole IB bus.
# Archived manifests: k8s/legacy/ib-socket/manifest.yaml (not applied by kustomize).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: massive-ws
  labels:
    app.kubernetes.io/name: massive-ws
    app.kubernetes.io/component: socket
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: massive-ws
  template:
    metadata:
      labels:
        app.kubernetes.io/name: massive-ws
        app.kubernetes.io/component: socket
    spec:
      volumes:
        - name: bifrost-config
          configMap:
            name: bifrost-config
      initContainers:
        - name: wait-for-data
          image: registry.cicd.svc.cluster.local:5000/bifrost-socket:stg
          imagePullPolicy: Always
          command: ["python", "scripts/wait_for_data.py", "--no-pg"]
          workingDir: /src/bifrost-trade-socket
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
      containers:
        - name: massive-ws
          image: registry.cicd.svc.cluster.local:5000/bifrost-socket:stg
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/run_massive_ws.py"]
          workingDir: /src/bifrost-trade-socket
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
          envFrom:
            - secretRef:
                name: bifrost-stg-secrets
                optional: true
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
          readinessProbe:
            exec:
              command: ["python", "scripts/wait_for_data.py", "--no-pg", "--once"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
