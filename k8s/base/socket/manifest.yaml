# Phase B stg v2 — IB edge + Massive WS (shared bifrost-socket:stg image).
#
# W5 trade-k8s-native: the three IB edge services are StatefulSets with a K8s
# Lease (coordination.k8s.io/Lease) for Active-Standby HA. IB caps each TWS at 32
# API clients and rejects a duplicate clientId with Error 326, so only the Lease
# holder opens the IB socket; standby pods wait. Scale a StatefulSet to 2 to get a
# hot standby (replicas: 1 default keeps current single-active behaviour).
# Massive WS talks to Polygon (no IB clientId) and stays a plain Deployment.
# W6 trade-k8s-native: ib-market-gateway merges legacy ingestor + listener +
# worker_market into one market_gateway client_id per TWS host (3 gateways/env).
---
apiVersion: v1
kind: Service
metadata:
  name: ib-market-gateway
  labels:
    app.kubernetes.io/name: ib-market-gateway
    app.kubernetes.io/component: socket
spec:
  clusterIP: None  # headless — governs StatefulSet pod network identity
  selector:
    app.kubernetes.io/name: ib-market-gateway
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ib-market-gateway
  labels:
    app.kubernetes.io/name: ib-market-gateway
    app.kubernetes.io/component: socket
spec:
  serviceName: ib-market-gateway
  replicas: 1
  podManagementPolicy: Parallel  # standby starts hot alongside the active pod
  selector:
    matchLabels:
      app.kubernetes.io/name: ib-market-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ib-market-gateway
        app.kubernetes.io/component: socket
    spec:
      serviceAccountName: ib-socket  # Lease get/create/update RBAC (ib-socket-rbac.yaml)
      volumes:
        - name: bifrost-config
          configMap:
            name: bifrost-config
      containers:
        - name: ib-market-gateway
          image: registry.cicd.svc.cluster.local:5000/bifrost-socket:stg
          imagePullPolicy: IfNotPresent
          command: ["python", "scripts/run_ib_market_gateway.py"]
          workingDir: /src/bifrost-trade-socket
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: stg
            # W5: K8s Lease active-standby — only the holder opens the IB socket.
            - name: BIFROST_IB_LEASE_ENABLED
              value: "1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - secretRef:
                name: bifrost-stg-secrets
                optional: true
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.stg.yaml
              subPath: config.stg.yaml
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
