apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-monitor
  labels:
    app.kubernetes.io/name: api-monitor
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-monitor
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api-monitor
          image: registry.cicd.svc.cluster.local:5000/bifrost-api-monitor:stg
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8765
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
