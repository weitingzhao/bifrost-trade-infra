# Example — copy to bifrost-prod-secrets.yaml (gitignored), fill from .env, then:
#   kubectl apply -f k8s/base/secrets/bifrost-prod-secrets.yaml -n bifrost-prod
apiVersion: v1
kind: Secret
metadata:
  name: bifrost-prod-secrets
  labels:
    app.kubernetes.io/part-of: bifrost
type: Opaque
stringData:
  MASSIVE_API_KEY: "CHANGE_ME"
  POLYGON_API_KEY: "CHANGE_ME"
  OPS_OPERATOR_TOKEN: "CHANGE_ME"
  OPS_ADMIN_TOKEN: "CHANGE_ME"
