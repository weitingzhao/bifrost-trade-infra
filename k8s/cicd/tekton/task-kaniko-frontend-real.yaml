# Session S8 — Kaniko build real bifrost-trade-frontend (expects Gitea clone workspace layout).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bifrost-kaniko-frontend-real
  namespace: cicd
  labels:
    bifrost.io/purpose: stg-build
spec:
  description: Build frontend image from workspace with bifrost-trade-frontend/ + bifrost-ui/ siblings
  params:
    - name: image
      type: string
      default: registry.cicd.svc.cluster.local:5000/bifrost-frontend:stg
    - name: dockerfile
      type: string
      default: Dockerfile.frontend-stg
  workspaces:
    - name: source
  steps:
    - name: assert-context
      image: alpine:3.20
      script: |
        #!/usr/bin/env sh
        set -eu
        root="$(workspaces.source.path)"
        test -f "${root}/Dockerfile.frontend-stg"
        test -f "${root}/bifrost-trade-frontend/package.json"
        test -f "${root}/bifrost-ui/package.json"
        echo "Build context OK"
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:v1.23.2
      args:
        - --dockerfile=$(params.dockerfile)
        - --context=$(workspaces.source.path)
        - --destination=$(params.image)
        - --insecure
        - --skip-tls-verify
        - --insecure-registry=registry.cicd.svc.cluster.local:5000
      computeResources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "4"
          memory: 6Gi
