# Post-deliver HTTP smoke inside bifrost-prod (W1 Traefik IngressRoute + Host header).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bifrost-verify-prod-deliver
  namespace: cicd
  labels:
    bifrost.io/purpose: prod-deliver
spec:
  params:
    - name: traefikBase
      type: string
      default: http://traefik.kube-system.svc.cluster.local
    - name: gatewayHost
      type: string
      default: trader.bifrost.lan
  steps:
    - name: http-smoke
      image: curlimages/curl:8.11.1
      script: |
        #!/bin/sh
        set -eu
        trf="$(params.traefikBase)"
        trf="${trf%/}"
        host="$(params.gatewayHost)"
        fail=0
        check() {
          id="$1"
          path="$2"
          url="${trf}${path}"
          code="$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 15 -H "Host: ${host}" "${url}" || echo 000)"
          echo "${id} ${url} (Host: ${host}) → HTTP ${code}"
          case "${code}" in
            200|503) ;;
            *) fail=1 ;;
          esac
        }
        check prod-frontend /
        check prod-api-monitor /api/monitor/status
        for d in massive docs ops trading strategy portfolio market research; do
          check "prod-api-${d}" "/api/${d}/health"
        done
        if [ "${fail}" -ne 0 ]; then
          echo "Prod verify failed — one or more endpoints unreachable" >&2
          exit 1
        fi
        echo "Prod verify passed (Traefik gateway + 9 API domains)"
