apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bifrost-rollout-stg
  namespace: cicd
  labels:
    bifrost.io/purpose: stg-deliver
spec:
  params:
    - name: namespace
      type: string
      default: bifrost-stg
  steps:
    - name: rollout-restart
      image: alpine/k8s:1.31.4
      script: |
        #!/bin/sh
        set -eu
        NS="$(params.namespace)"
        LEGACY="ib-ingestor ib-account-agent ib-operator"
        for dep in ${LEGACY}; do
          if kubectl get "deployment/${dep}" -n "${NS}" >/dev/null 2>&1; then
            echo "Pruning legacy deployment/${dep} (W5 StatefulSet migration)"
            kubectl delete "deployment/${dep}" -n "${NS}" --wait=true --timeout=120s
          fi
        done
        APIS="api-monitor api-massive api-docs api-ops api-trading api-strategy api-portfolio api-market api-research"
        WORKER="daemon account-sync celery-worker"
        DEPLOY="${APIS} ${WORKER} massive-ws"
        # IBGP3 retired — legacy IB StatefulSets removed from kustomize; do not rollout/restart.
        rollout_dep() {
          dep="$1"
          timeout="$2"
          if ! kubectl get "deployment/${dep}" -n "${NS}" >/dev/null 2>&1; then
            echo "SKIP deployment/${dep} — not present in ${NS}"
            return 0
          fi
          desired="$(kubectl get "deployment/${dep}" -n "${NS}" -o jsonpath='{.spec.replicas}')"
          echo "Rollout deployment/${dep} (replicas=${desired:-?})"
          kubectl rollout restart "deployment/${dep}" -n "${NS}"
          if ! kubectl rollout status "deployment/${dep}" -n "${NS}" --timeout="${timeout}"; then
            echo "ROLL_FAILED deployment/${dep} in ${NS}"
            kubectl describe "deployment/${dep}" -n "${NS}" | tail -40
            kubectl get pods -n "${NS}" -l "app.kubernetes.io/name=${dep}" -o wide 2>/dev/null || \
              kubectl get pods -n "${NS}" | grep "${dep}" || true
            exit 1
          fi
        }
        rollout_dep frontend 300s
        for dep in ${DEPLOY}; do
          rollout_dep "${dep}" 600s
        done
        kubectl get ingressroute trade-gateway -n "${NS}"
        echo "Rollout complete in ${NS} (Traefik gateway + frontend + 9 APIs + worker + massive-ws)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bifrost-argocd-sync-stg
  namespace: cicd
  labels:
    bifrost.io/purpose: stg-deliver
spec:
  params:
    - name: application
      type: string
      default: bifrost-stg
    - name: namespace
      type: string
      default: cicd
  steps:
    - name: sync
      image: alpine/k8s:1.31.4
      script: |
        #!/bin/sh
        set -eu
        APP="$(params.application)"
        NS="$(params.namespace)"
        kubectl patch application "${APP}" -n "${NS}" --type merge -p \
          '{"operation":{"initiatedBy":{"username":"tekton-deliver"},"sync":{"revision":"HEAD"}}}'
        echo "Sync requested for Application ${APP}"
