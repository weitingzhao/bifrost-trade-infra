apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bifrost-rollout-stg
  namespace: cicd
  labels:
    bifrost.io/purpose: stg-deliver
spec:
  params:
    - name: namespace
      type: string
      default: bifrost-stg
  steps:
    - name: rollout-restart
      image: alpine/k8s:1.31.4
      script: |
        #!/bin/sh
        set -eu
        NS="$(params.namespace)"
        APIS="api-monitor api-massive api-docs api-ops api-trading api-strategy api-portfolio api-market api-research"
        WORKER="daemon account-sync celery-worker"
        DEPLOY="${APIS} ${WORKER} massive-ws"
        STATEFUL="ib-market-gateway ib-account-agent ib-operator"
        kubectl rollout restart "deployment/frontend" -n "${NS}"
        for dep in ${DEPLOY}; do
          kubectl rollout restart "deployment/${dep}" -n "${NS}"
        done
        for sts in ${STATEFUL}; do
          kubectl rollout restart "statefulset/${sts}" -n "${NS}"
        done
        kubectl get ingressroute trade-gateway -n "${NS}"
        kubectl rollout status deployment/frontend -n "${NS}" --timeout=300s
        for dep in ${DEPLOY}; do
          kubectl rollout status "deployment/${dep}" -n "${NS}" --timeout=600s
        done
        for sts in ${STATEFUL}; do
          kubectl rollout status "statefulset/${sts}" -n "${NS}" --timeout=600s
        done
        echo "Rollout complete in ${NS} (Traefik gateway + frontend + 9 APIs + worker + socket)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bifrost-argocd-sync-stg
  namespace: cicd
  labels:
    bifrost.io/purpose: stg-deliver
spec:
  params:
    - name: application
      type: string
      default: bifrost-stg
    - name: namespace
      type: string
      default: cicd
  steps:
    - name: sync
      image: alpine/k8s:1.31.4
      script: |
        #!/bin/sh
        set -eu
        APP="$(params.application)"
        NS="$(params.namespace)"
        kubectl patch application "${APP}" -n "${NS}" --type merge -p \
          '{"operation":{"initiatedBy":{"username":"tekton-deliver"},"sync":{"revision":"HEAD"}}}'
        echo "Sync requested for Application ${APP}"
