# CI gate for Python Trade repos (core / api / worker / socket).
# Lightweight: clone → install → lint → test. No image build, no deploy.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: bifrost-ci-python
  namespace: cicd
  labels:
    bifrost.io/purpose: ci-gate
    bifrost.io/layer: L2
spec:
  description: >-
    CI gate for Python repos — ruff lint + pytest (skipping IB/DB markers).
    Triggered by Gitea push webhook or manual Console run.
  params:
    - name: repo
      type: string
      description: "Repository name (e.g. bifrost-trade-core)"
    - name: revision
      type: string
      default: main
    - name: giteaBase
      type: string
      default: http://gitea.cicd.svc.cluster.local:3000/bifrost
  workspaces:
    - name: source
  tasks:
    - name: clone
      taskRef:
        name: bifrost-git-clone-gitea
      params:
        - name: url
          value: $(params.giteaBase)/$(params.repo).git
        - name: revision
          value: $(params.revision)
        - name: subdir
          value: repo
      workspaces:
        - name: output
          workspace: source
    - name: clone-core
      taskRef:
        name: bifrost-git-clone-gitea
      params:
        - name: url
          value: $(params.giteaBase)/bifrost-trade-core.git
        - name: revision
          value: $(params.revision)
        - name: subdir
          value: bifrost-trade-core
      workspaces:
        - name: output
          workspace: source
    - name: lint-test
      runAfter: [clone, clone-core]
      workspaces:
        - name: source
          workspace: source
      taskSpec:
        params:
          - name: repo
            type: string
        workspaces:
          - name: source
        steps:
          - name: install-and-test
            image: python:3.12-slim
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: "2"
                memory: 2Gi
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              ws="$(workspaces.source.path)"
              repo="$(params.repo)"
              cd "${ws}/repo"

              echo "==> Installing dependencies for ${repo}"
              pip install --quiet --upgrade pip

              # If not core itself, install core first as editable dep
              if [ "${repo}" != "bifrost-trade-core" ] && [ -d "${ws}/bifrost-trade-core" ]; then
                pip install --quiet -e "${ws}/bifrost-trade-core"
              fi

              # Install the repo itself with dev extras
              if [ -f pyproject.toml ]; then
                pip install --quiet -e ".[dev]" 2>/dev/null || pip install --quiet -e .
              elif [ -f setup.py ]; then
                pip install --quiet -e .
              elif [ -f requirements.txt ]; then
                pip install --quiet -r requirements.txt
              fi

              echo "==> Lint (ruff)"
              if command -v ruff >/dev/null 2>&1; then
                ruff check --output-format=concise . || {
                  echo "WARN: ruff found issues (non-blocking for now)"
                }
              else
                pip install --quiet ruff
                ruff check --output-format=concise . || {
                  echo "WARN: ruff found issues (non-blocking for now)"
                }
              fi

              echo "==> Test (pytest)"
              if command -v pytest >/dev/null 2>&1; then
                pytest -m 'not ib and not db' --tb=short -q || {
                  echo "WARN: some tests failed (non-blocking for now)"
                }
              else
                echo "pytest not found — skip (repo may have no tests yet)"
              fi

              echo "==> CI gate passed for ${repo}"
      params:
        - name: repo
          value: $(params.repo)
