# Post-deliver HTTP smoke inside cluster (Tier A — W1 Traefik IngressRoute + Host header).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bifrost-verify-stg-deliver
  namespace: cicd
  labels:
    bifrost.io/purpose: stg-deliver
spec:
  params:
    - name: traefikBase
      type: string
      default: http://traefik.kube-system.svc.cluster.local
    - name: gatewayHost
      type: string
      default: trade-stg.bifrost.lan
  steps:
    - name: http-smoke
      image: curlimages/curl:8.11.1
      script: |
        #!/bin/sh
        set -eu
        trf="$(params.traefikBase)"
        trf="${trf%/}"
        host="$(params.gatewayHost)"
        fail=0
        check() {
          id="$1"
          path="$2"
          url="${trf}${path}"
          code="$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 15 -H "Host: ${host}" "${url}" || echo 000)"
          echo "${id} ${url} (Host: ${host}) → HTTP ${code}"
          case "${code}" in
            200|503) ;;
            *) fail=1 ;;
          esac
        }
        check stg-frontend /
        check stg-api-monitor /api/monitor/status
        for d in massive docs ops trading strategy portfolio market research; do
          check "stg-api-${d}" "/api/${d}/health"
        done
        if [ "${fail}" -ne 0 ]; then
          echo "STG verify failed — one or more endpoints unreachable" >&2
          exit 1
        fi
        echo "STG verify passed (Traefik gateway + 9 API domains)"
