# Phase B — build all 9 Trade API images (single pod; one Kaniko step loop to avoid Tekton step resource sum).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bifrost-kaniko-all-apis-stg
  namespace: cicd
  labels:
    bifrost.io/purpose: stg-build
spec:
  description: Kaniko build bifrost-api-{domain}:stg for all FastAPI domains (shared context)
  params:
    - name: registry
      type: string
      default: registry.cicd.svc.cluster.local:5000
    - name: tag
      type: string
      default: stg
  workspaces:
    - name: source
  steps:
    - name: assert-context
      image: alpine:3.20
      script: |
        #!/usr/bin/env sh
        set -eu
        root="$(workspaces.source.path)"
        test -f "${root}/Dockerfile.api-stg"
        test -f "${root}/bifrost-trade-core/pyproject.toml"
        test -f "${root}/bifrost-trade-api/pyproject.toml"
        test -f "${root}/bifrost-trade-worker/pyproject.toml"
        test -f "${root}/bifrost-trade-socket/pyproject.toml"
        echo "API build context OK"
    - name: build-all-apis
      image: gcr.io/kaniko-project/executor:v1.23.2-debug
      env:
        - name: REGISTRY
          value: $(params.registry)
        - name: TAG
          value: $(params.tag)
      script: |
        #!/busybox/sh
        set -eu
        ctx="$(workspaces.source.path)"
        domains="monitor massive docs ops trading strategy portfolio market research"
        for d in ${domains}; do
          echo "=== Kaniko build bifrost-api-${d}:${TAG} ==="
          /kaniko/executor \
            --dockerfile="${ctx}/Dockerfile.api-stg" \
            --context="${ctx}" \
            --destination="${REGISTRY}/bifrost-api-${d}:${TAG}" \
            --build-arg="API_DOMAIN=${d}" \
            --custom-platform=linux/amd64 \
            --insecure \
            --skip-tls-verify \
            --insecure-registry="${REGISTRY}"
        done
        echo "All 9 API images pushed."
      computeResources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "4"
          memory: 6Gi
