    - name: build-api-market
      image: gcr.io/kaniko-project/executor:v1.23.2
      args:
        - --dockerfile=Dockerfile.api-stg
        - --context=$(workspaces.source.path)
        - --destination=$(params.registry)/bifrost-api-market:$(params.tag)
        - --build-arg=API_DOMAIN=market
