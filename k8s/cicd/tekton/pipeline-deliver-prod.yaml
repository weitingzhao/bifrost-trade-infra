# Production delivery — symmetric to deliver-stg with prod overlay + prod smoke.
# Gate: STG preflight must pass before any prod build starts.
# Flow: preflight-stg → clone → prepare → build (API+FE+worker) → rollout → verify-prod → Argo sync.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: bifrost-deliver-prod
  namespace: cicd
  labels:
    bifrost.io/purpose: prod-deliver
    bifrost.io/layer: L2
spec:
  description: >-
    STG preflight gate → prepare → build prod images → rollout bifrost-prod →
    HTTP verify → Argo sync. Refuses to deploy if STG is unhealthy.
  params:
    - name: revision
      type: string
      default: main
    - name: giteaBase
      type: string
      default: http://gitea.cicd.svc.cluster.local:3000/bifrost
    - name: registry
      type: string
      default: registry.cicd.svc.cluster.local:5000
    - name: tag
      type: string
      default: prod
    - name: frontendImage
      type: string
      default: registry.cicd.svc.cluster.local:5000/bifrost-frontend:prod
  workspaces:
    - name: build-context
  tasks:
    - name: preflight-stg
      taskSpec:
        params:
          - name: traefikBase
            type: string
          - name: gatewayHost
            type: string
        steps:
          - name: stg-smoke-gate
            image: curlimages/curl:8.11.1
            script: |
              #!/bin/sh
              set -eu
              echo "==> Prod preflight: verifying STG health before prod deploy (W1 Traefik)"
              trf="$(params.traefikBase)"
              trf="${trf%/}"
              host="$(params.gatewayHost)"
              fail=0
              check() {
                id="$1"; path="$2"; url="${trf}${path}"
                code="$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 10 -H "Host: ${host}" "${url}" || echo 000)"
                echo "  ${id} → HTTP ${code}"
                case "${code}" in 200|503) ;; *) fail=1 ;; esac
              }
              check frontend /
              check api-monitor /api/monitor/status
              for d in massive docs ops trading strategy portfolio market research; do
                check "api-${d}" "/api/${d}/health"
              done
              if [ "${fail}" -ne 0 ]; then
                echo "BLOCKED: STG is unhealthy — refusing to deploy to prod" >&2
                exit 1
              fi
              echo "==> STG preflight passed — proceeding with prod deploy"
      params:
        - name: traefikBase
          value: http://traefik.kube-system.svc.cluster.local
        - name: gatewayHost
          value: trade-stg.bifrost.lan
    - name: clone-core
      runAfter: [preflight-stg]
      taskRef:
        name: bifrost-git-clone-gitea
      params:
        - name: url
          value: $(params.giteaBase)/bifrost-trade-core.git
        - name: revision
          value: $(params.revision)
        - name: subdir
          value: bifrost-trade-core
      workspaces:
        - name: output
          workspace: build-context
    - name: clone-worker
      runAfter: [preflight-stg]
      taskRef:
        name: bifrost-git-clone-gitea
      params:
        - name: url
          value: $(params.giteaBase)/bifrost-trade-worker.git
        - name: revision
          value: $(params.revision)
        - name: subdir
          value: bifrost-trade-worker
      workspaces:
        - name: output
          workspace: build-context
    - name: clone-socket
      runAfter: [preflight-stg]
      taskRef:
        name: bifrost-git-clone-gitea
      params:
        - name: url
          value: $(params.giteaBase)/bifrost-trade-socket.git
        - name: revision
          value: $(params.revision)
        - name: subdir
          value: bifrost-trade-socket
      workspaces:
        - name: output
          workspace: build-context
    - name: clone-api
      runAfter: [preflight-stg]
      taskRef:
        name: bifrost-git-clone-gitea
      params:
        - name: url
          value: $(params.giteaBase)/bifrost-trade-api.git
        - name: revision
          value: $(params.revision)
        - name: subdir
          value: bifrost-trade-api
      workspaces:
        - name: output
          workspace: build-context
    - name: clone-frontend
      runAfter: [preflight-stg]
      taskRef:
        name: bifrost-git-clone-gitea
      params:
        - name: url
          value: $(params.giteaBase)/bifrost-trade-frontend.git
        - name: revision
          value: $(params.revision)
        - name: subdir
          value: bifrost-trade-frontend
      workspaces:
        - name: output
          workspace: build-context
    - name: clone-ui
      runAfter: [preflight-stg]
      taskRef:
        name: bifrost-git-clone-gitea
      params:
        - name: url
          value: $(params.giteaBase)/bifrost-ui.git
        - name: revision
          value: $(params.revision)
        - name: subdir
          value: bifrost-ui
      workspaces:
        - name: output
          workspace: build-context
    - name: clone-infra
      runAfter: [preflight-stg]
      taskRef:
        name: bifrost-git-clone-gitea
      params:
        - name: url
          value: $(params.giteaBase)/bifrost-trade-infra.git
        - name: revision
          value: $(params.revision)
        - name: subdir
          value: bifrost-trade-infra
      workspaces:
        - name: output
          workspace: build-context
    - name: prepare
      runAfter: [clone-infra]
      taskRef:
        name: bifrost-prepare-deliver-stg
      params:
        - name: giteaBase
          value: $(params.giteaBase)
      workspaces:
        - name: source
          workspace: build-context
    - name: stage-api-dockerfile
      runAfter: [prepare, clone-core, clone-worker, clone-socket, clone-api]
      workspaces:
        - name: source
          workspace: build-context
      taskSpec:
        workspaces:
          - name: source
        volumes:
          - name: dockerfile-cm
            configMap:
              name: bifrost-api-stg-dockerfile
        steps:
          - name: copy
            image: alpine:3.20
            volumeMounts:
              - name: dockerfile-cm
                mountPath: /cm
            script: |
              #!/usr/bin/env sh
              set -eu
              cp /cm/Dockerfile.api-stg "$(workspaces.source.path)/Dockerfile.api-stg"
    - name: build-all-apis
      runAfter: [stage-api-dockerfile]
      taskRef:
        name: bifrost-kaniko-all-apis-stg
      params:
        - name: registry
          value: $(params.registry)
        - name: tag
          value: $(params.tag)
      workspaces:
        - name: source
          workspace: build-context
    - name: stage-frontend-dockerfile
      runAfter: [prepare, clone-frontend, clone-ui]
      workspaces:
        - name: source
          workspace: build-context
      taskSpec:
        workspaces:
          - name: source
        volumes:
          - name: dockerfile-cm
            configMap:
              name: bifrost-frontend-stg-dockerfile
        steps:
          - name: copy
            image: alpine:3.20
            volumeMounts:
              - name: dockerfile-cm
                mountPath: /cm
            script: |
              #!/usr/bin/env sh
              set -eu
              cp /cm/Dockerfile.frontend-stg "$(workspaces.source.path)/Dockerfile.frontend-stg"
    - name: build-frontend
      runAfter: [stage-frontend-dockerfile]
      taskRef:
        name: bifrost-kaniko-frontend-real
      params:
        - name: image
          value: $(params.frontendImage)
      workspaces:
        - name: source
          workspace: build-context
    - name: build-worker-socket
      runAfter: [prepare, clone-core, clone-worker, clone-socket]
      taskRef:
        name: bifrost-kaniko-worker-socket-stg
      params:
        - name: registry
          value: $(params.registry)
        - name: tag
          value: $(params.tag)
      workspaces:
        - name: source
          workspace: build-context
    - name: rollout
      runAfter: [build-all-apis, build-frontend, build-worker-socket]
      taskRef:
        name: bifrost-rollout-stg
      params:
        - name: namespace
          value: bifrost-prod
    - name: verify-prod
      runAfter: [rollout]
      taskRef:
        name: bifrost-verify-prod-deliver
    - name: gitops-sync
      runAfter: [verify-prod]
      taskRef:
        name: bifrost-argocd-sync-stg
      params:
        - name: application
          value: bifrost-prod
