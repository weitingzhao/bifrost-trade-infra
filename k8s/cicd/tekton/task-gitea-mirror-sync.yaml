# Standalone Gitea mirror-sync (Ops Console Supply Chain → Sync mirrors).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bifrost-gitea-mirror-sync
  namespace: cicd
  labels:
    bifrost.io/purpose: stg-deliver
spec:
  params:
    - name: giteaBase
      type: string
      default: http://gitea.cicd.svc.cluster.local:3000/bifrost
    - name: mirrorRepos
      type: string
      default: "bifrost-trade-core bifrost-trade-worker bifrost-trade-socket bifrost-trade-api bifrost-trade-frontend bifrost-trade-infra bifrost-ui bifrost-platform"
  steps:
    - name: mirror-sync
      image: curlimages/curl:8.11.1
      env:
        - name: GITEA_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitea-bootstrap
              key: gitea_admin_token
              optional: true
      script: |
        #!/bin/sh
        set -eu
        if [ -z "${GITEA_TOKEN:-}" ]; then
          echo "ERROR: gitea-bootstrap/gitea_admin_token missing — cannot mirror-sync" >&2
          exit 1
        fi
        base="$(params.giteaBase)"
        org="${base##*/}"
        api="${base%/bifrost}/api/v1"
        for repo in $(params.mirrorRepos); do
          code="$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            "${api}/repos/${org}/${repo}/mirror-sync" \
            -d '{}')"
          echo "mirror-sync ${org}/${repo} → HTTP ${code}"
          case "${code}" in
            200|201|202|204) ;;
            *) exit 1 ;;
          esac
        done
        echo "Gitea mirror-sync complete"
