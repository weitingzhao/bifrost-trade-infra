apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tekton-deliver-rollout
  namespace: bifrost-prod
rules:
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, patch, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-deliver-rollout
  namespace: bifrost-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tekton-deliver-rollout
subjects:
  - kind: ServiceAccount
    name: tekton-deliver
    namespace: cicd
