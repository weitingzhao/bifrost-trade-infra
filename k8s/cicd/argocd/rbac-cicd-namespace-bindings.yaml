# Argo CD upstream install.yaml binds ClusterRoles to ServiceAccounts in the
# default "argocd" namespace. Bifrost installs Argo into "cicd" instead, so
# controllers run without cluster permissions until these bindings are patched.
#
# Symptom: Application sync status Unknown + ComparisonError mentioning RBAC
# (e.g. tlsoptions.traefik.io forbidden) while health may still show Healthy.
#
# Apply after install-argocd.sh:
#   kubectl apply -f k8s/cicd/argocd/rbac-cicd-namespace-bindings.yaml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-application-controller
  labels:
    app.kubernetes.io/part-of: argocd
    bifrost.io/component: argocd-rbac-fix
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-application-controller
subjects:
  - kind: ServiceAccount
    name: argocd-application-controller
    namespace: cicd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-server
  labels:
    app.kubernetes.io/part-of: argocd
    bifrost.io/component: argocd-rbac-fix
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-server
subjects:
  - kind: ServiceAccount
    name: argocd-server
    namespace: cicd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-applicationset-controller
  labels:
    app.kubernetes.io/part-of: argocd
    bifrost.io/component: argocd-rbac-fix
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-applicationset-controller
subjects:
  - kind: ServiceAccount
    name: argocd-applicationset-controller
    namespace: cicd
