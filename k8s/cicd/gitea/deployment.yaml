# Minimal Gitea for cicd namespace smoke (Session S3 — not production HA).
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: cicd
  labels:
    app: gitea
    bifrost.io/component: gitea
spec:
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: cicd
  labels:
    app: gitea
    bifrost.io/component: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
        bifrost.io/component: gitea
    spec:
      containers:
        - name: gitea
          image: gitea/gitea:1.21.11
          ports:
            - containerPort: 3000
          env:
            - name: GITEA__database__DB_TYPE
              value: sqlite3
            - name: GITEA__server__DOMAIN
              value: gitea.cicd.svc
            - name: GITEA__server__ROOT_URL
              value: http://gitea.cicd.svc:3000/
            - name: GITEA__server__HTTP_PORT
              value: "3000"
          volumeMounts:
            - name: gitea-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: gitea-data
          emptyDir: {}
