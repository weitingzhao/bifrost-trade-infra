# Gitea in cicd — primary Git for CI (Session S3 smoke → S7.5 persistent).
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: cicd
  labels:
    app: gitea
    bifrost.io/component: gitea
spec:
  type: NodePort
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: cicd
  labels:
    app: gitea
    bifrost.io/component: gitea
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
        bifrost.io/component: gitea
    spec:
      # local-path PVC is node-bound — pin to control-plane (.73) by default.
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/etcd
          operator: Exists
          effect: NoSchedule
      containers:
        - name: gitea
          image: gitea/gitea:1.21.11
          ports:
            - containerPort: 3000
          env:
            - name: GITEA__database__DB_TYPE
              value: sqlite3
            - name: GITEA__server__DOMAIN
              value: gitea.cicd.svc
            - name: GITEA__server__ROOT_URL
              value: http://gitea.cicd.svc:3000/
            - name: GITEA__server__HTTP_PORT
              value: "3000"
          volumeMounts:
            - name: gitea-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-data
