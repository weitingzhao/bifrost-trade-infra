# Scrape Bifrost Trade API /metrics from bifrost-* namespaces.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bifrost-trade-apis
  labels:
    app.kubernetes.io/component: api
spec:
  namespaceSelector:
    matchNames:
      - bifrost-stg
      - bifrost-dev
      - bifrost-prod
  selector:
    matchLabels:
      app.kubernetes.io/component: api
      app.kubernetes.io/part-of: bifrost
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
