# Prometheus Operator scrape configs — always namespace: monitoring (not transformed by trade overlays).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - bifrost-trade-apis.yaml
  - bifrost-redis.yaml
  - bifrost-postgres.yaml
  - bifrost-alerting-rules.yaml
  - alertmanager-webhook-auth-secret.yaml
  - alertmanager-webhook-network-policy.yaml
  - grafana-dashboards-configmap.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: bifrost
      release: kube-prometheus-stack
    includeSelectors: false
