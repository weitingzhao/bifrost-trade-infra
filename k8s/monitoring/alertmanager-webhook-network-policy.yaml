# Allow Alertmanager (monitoring NS) to POST webhooks to platform-api in bifrost-platform-stg.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alertmanager-webhook-egress
  labels:
    app.kubernetes.io/component: alertmanager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  policyTypes:
    - Egress
  egress:
    # CoreDNS — required for platform-api.svc.cluster.local resolution.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bifrost-platform-stg
          podSelector:
            matchLabels:
              app.kubernetes.io/name: platform-api
      ports:
        - protocol: TCP
          port: 8780
