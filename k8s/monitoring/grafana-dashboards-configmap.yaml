# Bifrost Trade overview dashboard — auto-loaded by Grafana sidecar (label grafana_dashboard=1).
apiVersion: v1
kind: ConfigMap
metadata:
  name: bifrost-trade-dashboards
  labels:
    grafana_dashboard: "1"
data:
  bifrost-trade-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=~\"bifrost-.*\"}[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Trade API request rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "max": 1 }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=~\"bifrost-.*\",status=\"5xx\"}[5m])) by (service) / sum(rate(http_requests_total{namespace=~\"bifrost-.*\"}[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Trade API 5xx error rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=~\"bifrost-.*\"}[5m])) by (le, service))",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Trade API P99 latency",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "id": 4,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "redis_memory_used_bytes{namespace=\"data\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Redis memory used",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "id": 5,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "redis_connected_clients{namespace=\"data\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Redis connected clients",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "id": 6,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "rate(redis_commands_processed_total{namespace=\"data\"}[5m])",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "Redis ops/sec",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 16 },
          "id": 7,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(cnpg_backends_total{namespace=\"data\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "PostgreSQL connections",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 16 },
          "id": 8,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "cnpg_pg_stat_replication_replay_lag_seconds{namespace=\"data\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "PostgreSQL replication lag",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 16 },
          "id": 9,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "cnpg_pg_wal{namespace=\"data\"}",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "title": "PostgreSQL WAL size",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["bifrost", "trade"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Bifrost Trade Overview",
      "uid": "bifrost-trade-overview",
      "version": 1
    }
