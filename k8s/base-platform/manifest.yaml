apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  labels:
    app.kubernetes.io/name: platform-api
    app.kubernetes.io/component: platform-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-api
        app.kubernetes.io/component: platform-api
    spec:
      containers:
        - name: platform-api
          image: registry.cicd.svc.cluster.local:5000/bifrost-platform-api:stg
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8780
          env:
            - name: PLATFORM_CONFIG
              value: /app/config/environments.yaml
            - name: PLATFORM_KUBECONFIG
              value: /var/kubeconfig/bifrost-k3s.yaml
            - name: PLATFORM_LISTEN
              value: ":8780"
            - name: PLATFORM_DATA_DIR
              value: /app/data
          volumeMounts:
            - name: platform-config
              mountPath: /app/config
              readOnly: true
            - name: platform-programs
              mountPath: /app/config/programs
              readOnly: true
            - name: kubeconfig
              mountPath: /var/kubeconfig
              readOnly: true
            - name: platform-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: platform-config
          configMap:
            name: bifrost-platform-config
        - name: platform-programs
          configMap:
            name: bifrost-platform-programs
        - name: kubeconfig
          secret:
            secretName: bifrost-platform-kubeconfig
            optional: true
        - name: platform-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  labels:
    app.kubernetes.io/name: platform-api
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: platform-api
  ports:
    - name: http
      port: 8780
      targetPort: http
      nodePort: 30878
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-console
  labels:
    app.kubernetes.io/name: platform-console
    app.kubernetes.io/component: platform-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-console
        app.kubernetes.io/component: platform-console
    spec:
      containers:
        - name: platform-console
          image: registry.cicd.svc.cluster.local:5000/bifrost-platform-console:stg
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: platform-console
  labels:
    app.kubernetes.io/name: platform-console
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: platform-console
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30879
