# k3s Traefik — legacy NodePort entrypoints for IP-only LAN access (no /etc/hosts).
# STG :30880 · PROD :30881 · DEV :30882 on .73; Host/VIP :80/:443 via IngressRoute for browsers.
# HTTPS redirect is handled per-IngressRoute (trade/ops *-http-redirect), not entryPoint-wide
# so NodePort escapes stay plain HTTP (required for in-cluster platform-api matrix probes).
# Apply: kubectl apply -f k8s/system/traefik-trade-nodeports.yaml
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    ports:
      trade-stg:
        port: 30880
        expose:
          default: true
        exposedPort: 30880
        protocol: TCP
      trade-prod:
        port: 30881
        expose:
          default: true
        exposedPort: 30881
        protocol: TCP
      trade-dev:
        port: 30882
        expose:
          default: true
        exposedPort: 30882
        protocol: TCP
