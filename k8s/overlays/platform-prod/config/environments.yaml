# Registered Bifrost Trade environments for connectivity matrix (Phase 0).
# In-cluster platform-api MUST use Traefik NodePort escape hatches — CoreDNS cannot
# resolve *.bifrost.lan, and VIP :80 redirects to https://*.lan (DNS fail on follow).

environments:
  - id: dev
    label: Development
    probe_mode: pull
    nginx_base: http://192.168.10.73:30882
    ingress_host: dev.trader.bifrost.lan
    ingress_node_ip: 192.168.10.73
    postgres:
      host: 192.168.10.73
      port: 30432
    redis:
      host: 192.168.10.73
      port: 30379
    ops_token_env: BIFROST_DEV_OPS_TOKEN

  - id: stg
    label: Staging
    probe_mode: pull
    nginx_base: http://192.168.10.73:30880
    ingress_host: stg.trader.bifrost.lan
    ingress_node_ip: 192.168.10.73
    postgres:
      host: 192.168.10.73
      port: 30432
    redis:
      host: 192.168.10.73
      port: 30380
    ops_token_env: BIFROST_STG_OPS_TOKEN

  - id: prod
    label: Production
    probe_mode: pull
    # Traefik trade-prod entryPoint — plain HTTP, no HTTPS redirect.
    nginx_base: http://192.168.10.73:30881
    ingress_host: trader.bifrost.lan
    ingress_node_ip: 192.168.10.73
    postgres:
      host: 192.168.10.73
      port: 30432
    redis:
      host: 192.168.10.73
      port: 30382
    ops_token_env: BIFROST_PROD_OPS_TOKEN
