# HTTP :80 → HTTPS :443 for Rocket PROD Console.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  labels:
    app.kubernetes.io/name: ops-gateway
spec:
  redirectScheme:
    scheme: https
    port: "443"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-gateway-http-redirect
  labels:
    app.kubernetes.io/name: ops-gateway
    app.kubernetes.io/component: ingress-redirect
    bifrost.io/gateway-host: ops.bifrost.lan
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`ops.bifrost.lan`)
      kind: Rule
      priority: 10
      middlewares:
        - name: redirect-https
      services:
        - name: platform-console
          port: 80
