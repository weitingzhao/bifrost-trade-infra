# Rocket Ops Console — Traefik Host on VIP :80.
# Primary: ops.bifrost.lan → platform-console (nginx proxies /api → platform-api).
# Escape hatch remains NodePort :30877.
# Smoke: curl -sS -o /dev/null -w '%{http_code}\n' -H 'Host: ops.bifrost.lan' http://192.168.10.100/
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ops-gateway
  labels:
    app.kubernetes.io/name: ops-gateway
    app.kubernetes.io/component: ingress
    bifrost.io/gateway-host: ops.bifrost.lan
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`ops.bifrost.lan`)
      kind: Rule
      priority: 10
      services:
        - name: platform-console
          port: 80
