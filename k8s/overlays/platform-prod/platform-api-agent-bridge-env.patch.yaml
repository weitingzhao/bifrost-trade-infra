# In-cluster platform-api must reach Mac Mini runners + Mac Pro Git Bridge on LAN.
# Without these, /api/v1/agent/bridge defaults to http://127.0.0.1:8781 (Runner down).
# LAN URLs are non-secret (same as bifrost-platform/.env); do not put passwords here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
spec:
  template:
    spec:
      containers:
        - name: platform-api
          env:
            - name: REMEDIATION_RUNNER_URL
              value: "http://192.168.10.50:8781"
            - name: REMEDIATION_RUNNER_STANDBY_URL
              value: "http://192.168.10.52:8781"
            - name: GIT_BRIDGE_URL
              value: "http://192.168.10.40:8785"
            - name: NOUS_HERMES_URL
              value: "http://192.168.10.50:9119"
            - name: PLATFORM_GRAFANA_URL
              value: "http://192.168.10.73:30883"
