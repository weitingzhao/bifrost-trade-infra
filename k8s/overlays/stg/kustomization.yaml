apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bifrost-stg

resources:
  - ../../base
  - trade-ingressroute.yaml

configMapGenerator:
  - name: bifrost-config
    files:
      - config/config.stg.yaml
      - config/config.yaml.example
    options:
      disableNameSuffixHash: true

patches:
  - path: node-control-plane.patch.yaml
  - path: stg-images-pull-always.patch.yaml
  - path: api-ops-celery.patch.yaml
  - path: postgres-remove.patch.yaml
  - path: redis-remove.patch.yaml

# Kubelet pulls images on the node host — it cannot resolve *.svc.cluster.local.
# Use bootstrap node LAN IP + registry NodePort (30500) instead of in-cluster DNS.
images:
  - name: registry.cicd.svc.cluster.local:5000/bifrost-api-monitor
    newName: 192.168.10.73:30500/bifrost-api-monitor
  - name: registry.cicd.svc.cluster.local:5000/bifrost-api-massive
    newName: 192.168.10.73:30500/bifrost-api-massive
  - name: registry.cicd.svc.cluster.local:5000/bifrost-api-docs
    newName: 192.168.10.73:30500/bifrost-api-docs
  - name: registry.cicd.svc.cluster.local:5000/bifrost-api-ops
    newName: 192.168.10.73:30500/bifrost-api-ops
  - name: registry.cicd.svc.cluster.local:5000/bifrost-api-trading
    newName: 192.168.10.73:30500/bifrost-api-trading
  - name: registry.cicd.svc.cluster.local:5000/bifrost-api-strategy
    newName: 192.168.10.73:30500/bifrost-api-strategy
  - name: registry.cicd.svc.cluster.local:5000/bifrost-api-portfolio
    newName: 192.168.10.73:30500/bifrost-api-portfolio
  - name: registry.cicd.svc.cluster.local:5000/bifrost-api-market
    newName: 192.168.10.73:30500/bifrost-api-market
  - name: registry.cicd.svc.cluster.local:5000/bifrost-api-research
    newName: 192.168.10.73:30500/bifrost-api-research
  - name: registry.cicd.svc.cluster.local:5000/bifrost-frontend
    newName: 192.168.10.73:30500/bifrost-frontend
  - name: registry.cicd.svc.cluster.local:5000/bifrost-worker
    newName: 192.168.10.73:30500/bifrost-worker
  - name: registry.cicd.svc.cluster.local:5000/bifrost-socket
    newName: 192.168.10.73:30500/bifrost-socket

commonAnnotations:
  bifrost.io/environment: stg

labels:
  - pairs:
      bifrost.io/environment: stg
    includeSelectors: false
