# HTTP :80 → HTTPS :443 for STG Satellite hostname gateway.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: trade-gateway-http-redirect
  labels:
    app.kubernetes.io/name: trade-gateway
    app.kubernetes.io/component: ingress-redirect
    bifrost.io/gateway-host: stg.trader.bifrost.lan
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`stg.trader.bifrost.lan`)
      kind: Rule
      priority: 10
      middlewares:
        - name: redirect-https
      services:
        - name: frontend
          port: 80
