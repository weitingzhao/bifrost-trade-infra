# Pin stg workloads to control-plane until insecure registry is configured on all agents.
# Remove this patch after: sudo bash scripts/k3s/configure-insecure-registry.sh on each node.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-monitor
spec:
  template:
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/etcd
          operator: Exists
          effect: NoSchedule
---
