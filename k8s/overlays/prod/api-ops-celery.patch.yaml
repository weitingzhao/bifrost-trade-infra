# STG B1: Celery Worker Instances via api-ops subprocess; Deployment celery-worker scaled to 0.
# Worker/socket scripts + procps + Ops API code ship in bifrost-api-ops:stg (Dockerfile.api-stg).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-ops
spec:
  template:
    spec:
      volumes:
        - name: worker-logs
          emptyDir: {}
      containers:
        - name: api-ops
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: worker-logs
              mountPath: /build/bifrost-trade-worker/logs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
spec:
  replicas: 0
