apiVersion: batch/v1
kind: Job
metadata:
  name: db-init-prod
  labels:
    app.kubernetes.io/name: db-init
    app.kubernetes.io/component: infra
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-init
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        bifrost.io/host-id: mini-pc-a
      volumes:
        - name: bifrost-config
          configMap:
            name: bifrost-config
      containers:
        - name: db-init
          image: 192.168.10.73:30500/bifrost-api-monitor:prod
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /build/bifrost-trade-core/scripts/db/db_refresh_schema.py
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.prod.yaml
            - name: BIFROST_ENV
              value: prod
          volumeMounts:
            - name: bifrost-config
              mountPath: /app/config/config.prod.yaml
              subPath: config.prod.yaml
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
