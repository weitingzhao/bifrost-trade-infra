# Phase ⑥ — PROD uses redis-live/queue @ data NS (no embedded redis Deployment).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
$patch: delete
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  type: ExternalName
  externalName: redis-live-prod.data.svc.cluster.local
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
