# W1 — Traefik IngressRoute for bifrost-prod (replaces in-cluster nginx).
# IP: http://192.168.10.70/  ·  Hostname: trade.bifrost.lan via /etc/hosts
# Duplicate routes per Host (same as STG) — avoids OR/AND precedence issues in Traefik.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: trade-gateway
  labels:
    app.kubernetes.io/name: trade-gateway
    app.kubernetes.io/component: ingress
    bifrost.io/gateway-host: trade.bifrost.lan
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`trade.bifrost.lan`) && PathPrefix(`/api/monitor`)
      kind: Rule
      priority: 100
      middlewares:
        - name: strip-api-monitor
        - name: sse-streaming
      services:
        - name: api-monitor
          port: 8765
          responseForwarding:
            flushInterval: 1ms
    - match: Host(`192.168.10.70`) && PathPrefix(`/api/monitor`)
      kind: Rule
      priority: 100
      middlewares:
        - name: strip-api-monitor
        - name: sse-streaming
      services:
        - name: api-monitor
          port: 8765
          responseForwarding:
            flushInterval: 1ms
    - match: Host(`trade.bifrost.lan`) && PathPrefix(`/api/massive`)
      kind: Rule
      priority: 100
      middlewares:
        - name: strip-api-massive
        - name: sse-streaming
      services:
        - name: api-massive
          port: 8766
          responseForwarding:
            flushInterval: 1ms
