# Traefik IngressRoute for bifrost-prod.
# Primary: trader.bifrost.lan → VIP 192.168.10.100:80
# Escape: Host 192.168.10.70 / 192.168.10.100 (direct IP).
# Duplicate Host rules (no OR) — matches prior Traefik precedence practice.
# Smoke: curl -H 'Host: trader.bifrost.lan' https://192.168.10.100/api/monitor/status
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: trade-gateway
  labels:
    app.kubernetes.io/name: trade-gateway
    app.kubernetes.io/component: ingress
    bifrost.io/gateway-host: trader.bifrost.lan
spec:
  entryPoints:
    - websecure
  tls: {}
  routes:
    - match: Host(`trader.bifrost.lan`) && PathPrefix(`/api/monitor`)
      kind: Rule
      priority: 100
      middlewares:
        - name: strip-api-monitor
        - name: sse-streaming
      services:
        - name: api-monitor
          port: 8765
          responseForwarding:
            flushInterval: 1ms
