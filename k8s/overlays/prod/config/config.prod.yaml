# Prod overlay — deep-merged over config.yaml (from config.yaml.example).
# postgres/redis/ib/server 由 make sync-prod-config 从 .env 写入；勿手改后忘记同步。
# ops.auth.tokens：生产 token 勿提交 git；通过 .env OPS_* 或部署密钥注入。

server:
  skip_monitor_ib: false
  architecture:
    monitor_port: 8765
    ops_port: 8768
    docs_port: 8767
  account:
    trading_port: 8769
    portfolio_port: 8771
  research:
    research_port: 8773
    market_port: 8772
    strategy_port: 8770
  feed:
    massive_port: 8766

sink: postgres

ib_operator:
  enabled: true
  stream: "ib:operator:cmd"
  consumer_group: ib-operator
  result_prefix: "ib:operator:result:"
  health_key: "bifrost:health:ws_ib_operator"
  result_ttl_sec: 300
  request_timeout_sec: 120
  bars_backfill_request_timeout_sec: 7200
  health_refresh_sec: 30
  max_result_bytes: 4194304
  block_ms: 5000
  use_for_celery_bars: false

ib_connection:
  reconnect_base_sec: 2
  reconnect_max_sec: 60
  reconnect_max_exp: 6
  ib_probe_interval_sec: 15
  ib_probe_stale_multiplier: 2.5

ib:
  connect_timeout: 60.0
  host:
    ip: 192.168.10.30
    port_type: tws_live
    client_id:
      daemon: 10
      listener: 1
      operator: 20
      worker_market: 40
      ingestor: 50
      account_agent: 60
  secondary:
    ip: 192.168.10.33
    port_type: tws_live
    client_id:
      listener: 1
      operator: 20
      account_agent: 60

utilized:
  services:
    server: prod
    massive: prod
    docs: prod
    ops: prod
    trading: prod
    strategy: prod
    portfolio: prod
    market: prod
    research: prod

postgres:
  host: bifrost-postgres-rw.data.svc.cluster.local
  port: 5432
  user: bifrost
  password: bifrost_stg
  database: bifrost_prod

redis:
  enabled: true
  host: redis
  port: 6379
  db: 0

redis_queue:
  enabled: true
  host: redis-queue-prod.data.svc.cluster.local
  port: 6379
  db: 0

ops:
  control_profile: prod
  executor_mode: kubernetes
  kubernetes:
    namespace: bifrost-prod
  celery:
    prod_worker_hostnames:
      - celery-worker
  worker_profiles:
    stocks_ib:
      queues: ["stocks_ib"]
      max_worker_instances: 1
    options_massive:
      queues: ["options_massive"]
      pool: solo
      max_worker_instances: 4
    options_massive_high:
      queues: ["options_massive_high"]
      pool: solo
      max_worker_instances: 1
    stocks_massive:
      queues: ["stocks_massive"]
      pool: solo
      max_worker_instances: 2
    stocks_massive_high:
      queues: ["stocks_massive_high"]
      pool: solo
      max_worker_instances: 1
  auth:
    default_role: operator
    allow_unauthenticated_reads: false
    tokens: []
  audit:
    persist: true

massive:
  api_key: ""
  tier: starter
  ws_url: wss://delayed.polygon.io/options
  features:
    trades_enabled: false
    ws_enabled: false  # Options Starter = REST aggregates via Celery; WS needs Developer+

# P5B observe: daemon hedge is simulated only; no live IB order placement in worker code.
gates:
  guard:
    risk:
      paper_trade: true
      mock_hedging: true
