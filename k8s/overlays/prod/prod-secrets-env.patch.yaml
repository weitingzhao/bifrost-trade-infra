# Prod namespace: point env + secretRef at bifrost-prod (base defaults to stg).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: massive-ws
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-data
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: prod
      containers:
        - name: massive-ws
          env:
            - name: BIFROST_CONFIG
              value: /app/config/config.stg.yaml
            - name: BIFROST_ENV
              value: prod
          envFrom:
            - secretRef:
                name: bifrost-prod-secrets
                optional: true
