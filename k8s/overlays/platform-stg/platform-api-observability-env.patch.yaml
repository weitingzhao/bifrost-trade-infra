# Browser-reachable Grafana URL for Cluster → Observability deep links.
# Complements clusters.yaml observability_urls.grafana (platform-api loads config at startup).
# Also inject Agent Bridge LAN URLs (parity with platform-prod) so STG self-probes
# do not default to http://127.0.0.1:8781 inside the pod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
spec:
  template:
    spec:
      containers:
        - name: platform-api
          env:
            - name: OPS_VIEWER_ENV
              value: "stg"
            - name: PLATFORM_GRAFANA_URL
              value: "http://192.168.10.73:30883"
            - name: REMEDIATION_RUNNER_URL
              value: "http://192.168.10.50:8781"
            - name: REMEDIATION_RUNNER_STANDBY_URL
              value: "http://192.168.10.52:8781"
            - name: GIT_BRIDGE_URL
              value: "http://192.168.10.40:8785"
            - name: NOUS_HERMES_URL
              value: "http://192.168.10.50:9119"
