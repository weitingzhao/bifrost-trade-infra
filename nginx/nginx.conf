worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # API 后端 upstream 定义
    upstream api_monitor    { server api-monitor:8765; }
    upstream api_massive    { server api-massive:8766; }
    upstream api_docs       { server api-docs:8767; }
    upstream api_ops        { server api-ops:8768; }
    upstream api_trading    { server api-trading:8769; }
    upstream api_strategy   { server api-strategy:8770; }
    upstream api_portfolio  { server api-portfolio:8771; }
    upstream api_market     { server api-market:8772; }
    upstream api_research   { server api-research:8773; }

    server {
        listen 80;
        server_name _;

        # 前端 SPA
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API 路由 — 按路径前缀分发
        location /api/monitor/   { proxy_pass http://api_monitor/;   }
        location /api/massive/   { proxy_pass http://api_massive/;   }
        location /api/docs/      { proxy_pass http://api_docs/;      }
        location /api/ops/       { proxy_pass http://api_ops/;       }
        location /api/trading/   { proxy_pass http://api_trading/;   }
        location /api/strategy/  { proxy_pass http://api_strategy/;  }
        location /api/portfolio/ { proxy_pass http://api_portfolio/; }
        location /api/market/    { proxy_pass http://api_market/;    }
        location /api/research/  { proxy_pass http://api_research/;  }

        # SSE — 禁用缓冲，保持长连接
        location ~ /api/.*/stream {
            proxy_pass http://api_market/;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }
    }
}
