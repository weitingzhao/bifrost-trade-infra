worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Docker embedded DNS — re-resolve service names when containers restart (avoids stale 502).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API 后端 upstream 定义 (zone + resolve = pick up new container IPs after recreate)
    upstream api_monitor    { zone api_monitor 64k;    server api-monitor:8765 resolve; }
    upstream api_massive    { zone api_massive 64k;    server api-massive:8766 resolve; }
    upstream api_docs       { zone api_docs 64k;       server api-docs:8767 resolve; }
    upstream api_ops        { zone api_ops 64k;        server api-ops:8768 resolve; }
    upstream api_trading    { zone api_trading 64k;    server api-trading:8769 resolve; }
    upstream api_strategy   { zone api_strategy 64k;   server api-strategy:8770 resolve; }
    upstream api_portfolio  { zone api_portfolio 64k;  server api-portfolio:8771 resolve; }
    upstream api_market     { zone api_market 64k;     server api-market:8772 resolve; }
    upstream api_research   { zone api_research 64k;   server api-research:8773 resolve; }

    server {
        listen 80;
        server_name _;

        # 前端 SPA
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API 路由 — 按路径前缀分发（含 SSE：关闭缓冲、长 read timeout）
        location /api/monitor/ {
            proxy_pass http://api_monitor/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/massive/ {
            proxy_pass http://api_massive/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/docs/ {
            proxy_pass http://api_docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/ops/ {
            proxy_pass http://api_ops/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/trading/ {
            proxy_pass http://api_trading/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/strategy/ {
            proxy_pass http://api_strategy/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/portfolio/ {
            proxy_pass http://api_portfolio/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/market/ {
            proxy_pass http://api_market/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/research/ {
            proxy_pass http://api_research/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
    }
}
