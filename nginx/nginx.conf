worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # API 后端 upstream 定义
    upstream api_monitor    { server api-monitor:8765; }
    upstream api_massive    { server api-massive:8766; }
    upstream api_docs       { server api-docs:8767; }
    upstream api_ops        { server api-ops:8768; }
    upstream api_trading    { server api-trading:8769; }
    upstream api_strategy   { server api-strategy:8770; }
    upstream api_portfolio  { server api-portfolio:8771; }
    upstream api_market     { server api-market:8772; }
    upstream api_research   { server api-research:8773; }

    server {
        listen 80;
        server_name _;

        # 前端 SPA
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API 路由 — 按路径前缀分发（含 SSE：关闭缓冲、长 read timeout）
        location /api/monitor/ {
            proxy_pass http://api_monitor/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/massive/ {
            proxy_pass http://api_massive/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/docs/ {
            proxy_pass http://api_docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/ops/ {
            proxy_pass http://api_ops/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/trading/ {
            proxy_pass http://api_trading/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/strategy/ {
            proxy_pass http://api_strategy/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/portfolio/ {
            proxy_pass http://api_portfolio/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/market/ {
            proxy_pass http://api_market/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
        location /api/research/ {
            proxy_pass http://api_research/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
    }
}
