# Conservative defaults for bootstrap K3s clusters.
prometheus:
  prometheusSpec:
    retention: 10d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi

grafana:
  # Browser deep link for Ops Console → Open Grafana (STG @ .73:30883).
  service:
    type: NodePort
    port: 80
    nodePort: 30883
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      jsonData:
        maxLines: 1000

alertmanager:
  alertmanagerSpec:
    secrets:
      - alertmanager-webhook-auth
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - match_re:
            alertname: Bifrost.*
          receiver: bifrost-ops-agent
          continue: false
    receivers:
      - name: default
      - name: bifrost-ops-agent
        webhook_configs:
          - url: http://platform-api.bifrost-platform-stg.svc.cluster.local:8780/api/v1/ops-agent/alertmanager
            send_resolved: true
            http_config:
              bearer_token_file: /etc/alertmanager/secrets/alertmanager-webhook-auth/token
