# ============================================================
# Bifrost Trade — 本地开发 Docker Compose
# 使用方式: make dev  (或 docker compose -f docker-compose.dev.yml up)
# 特点: 挂载 monorepo 源码；entrypoint editable 安装 core/worker/socket/api
# 健康检查: make dev-health
# ============================================================

x-dev-repos: &dev-repos
  # rw mounts: entrypoint runs `pip install -e` (needs egg-info writes)
  - ../bifrost-trade-core:/workspace/bifrost-trade-core
  - ../bifrost-trade-worker:/workspace/bifrost-trade-worker
  - ../bifrost-trade-socket:/workspace/bifrost-trade-socket
  - ../bifrost-trade-api:/workspace/bifrost-trade-api
  - ../bifrost-trade-core/config/config.yaml.example:/app/config/config.yaml:ro
  - ./config/config.dev.yaml:/app/config/config.dev.yaml:ro

x-dev-env: &dev-env
  BIFROST_CONFIG: /app/config/config.dev.yaml
  BIFROST_ENV: dev

x-dev-build: &dev-build
  build:
    context: .
    dockerfile: docker/Dockerfile.dev

x-dev-api: &dev-api
  <<: *dev-build
  volumes: *dev-repos
  environment:
    <<: *dev-env
    BIFROST_DEV_STACK: api
  env_file:
    - path: .env
      required: false

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bifrost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bifrost_dev}
      POSTGRES_DB: ${POSTGRES_DB:-bifrost_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bifrost} -d ${POSTGRES_DB:-bifrost_dev}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  daemon:
    <<: *dev-build
    command: ["python", "/workspace/bifrost-trade-worker/scripts/run_daemon.py"]
    volumes: *dev-repos
    environment:
      <<: *dev-env
      BIFROST_DEV_STACK: daemon
    env_file:
    - path: .env
      required: false
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  ib-ingestor:
    <<: *dev-build
    command: ["python", "/workspace/bifrost-trade-socket/scripts/run_ib_ingestor.py"]
    volumes: *dev-repos
    environment:
      <<: *dev-env
      BIFROST_DEV_STACK: socket
    env_file:
    - path: .env
      required: false
    depends_on:
      redis: { condition: service_healthy }

  ib-account-agent:
    <<: *dev-build
    command: ["python", "/workspace/bifrost-trade-socket/scripts/run_ib_account_agent.py"]
    volumes: *dev-repos
    environment:
      <<: *dev-env
      BIFROST_DEV_STACK: socket
    env_file:
    - path: .env
      required: false
    depends_on:
      redis: { condition: service_healthy }

  ib-operator:
    <<: *dev-build
    command: ["python", "/workspace/bifrost-trade-socket/scripts/run_ib_operator.py"]
    volumes: *dev-repos
    environment:
      <<: *dev-env
      BIFROST_DEV_STACK: socket
    env_file:
    - path: .env
      required: false
    depends_on:
      redis: { condition: service_healthy }

  celery-worker:
    <<: *dev-build
    command: ["python", "/workspace/bifrost-trade-worker/scripts/run_celery.py"]
    volumes: *dev-repos
    environment:
      <<: *dev-env
      BIFROST_DEV_STACK: celery
    env_file:
    - path: .env
      required: false
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  api-monitor:
    <<: *dev-api
    command: ["python", "/workspace/bifrost-trade-api/scripts/run_server.py", "monitor"]
    ports: ["8765:8765"]
    depends_on:
      postgres: { condition: service_healthy }

  api-massive:
    <<: *dev-api
    command: ["python", "/workspace/bifrost-trade-api/scripts/run_server.py", "massive"]
    ports: ["8766:8766"]
    depends_on:
      postgres: { condition: service_healthy }

  api-docs:
    <<: *dev-api
    command: ["python", "/workspace/bifrost-trade-api/scripts/run_server.py", "docs"]
    ports: ["8767:8767"]

  api-ops:
    <<: *dev-api
    command: ["python", "/workspace/bifrost-trade-api/scripts/run_server.py", "ops"]
    ports: ["8768:8768"]
    depends_on:
      redis: { condition: service_healthy }

  api-trading:
    <<: *dev-api
    command: ["python", "/workspace/bifrost-trade-api/scripts/run_server.py", "trading"]
    ports: ["8769:8769"]
    depends_on:
      postgres: { condition: service_healthy }

  api-strategy:
    <<: *dev-api
    command: ["python", "/workspace/bifrost-trade-api/scripts/run_server.py", "strategy"]
    ports: ["8770:8770"]
    depends_on:
      postgres: { condition: service_healthy }

  api-portfolio:
    <<: *dev-api
    command: ["python", "/workspace/bifrost-trade-api/scripts/run_server.py", "portfolio"]
    ports: ["8771:8771"]
    depends_on:
      postgres: { condition: service_healthy }

  api-market:
    <<: *dev-api
    command: ["python", "/workspace/bifrost-trade-api/scripts/run_server.py", "market"]
    ports: ["8772:8772"]
    depends_on:
      redis: { condition: service_healthy }

  api-research:
    <<: *dev-api
    command: ["python", "/workspace/bifrost-trade-api/scripts/run_server.py", "research"]
    ports: ["8773:8773"]
    depends_on:
      postgres: { condition: service_healthy }

  frontend:
    image: node:20-slim
    working_dir: /app
    command: npm run dev -- --host
    volumes:
      - ../bifrost-trade-frontend:/app
    ports: ["5173:5173"]
    environment:
      - NODE_ENV=development

volumes:
  postgres-dev-data:
