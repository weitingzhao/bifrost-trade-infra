# K3s bifrost-stg — full stack (Tier A+B). Secrets: MASSIVE_API_KEY via bifrost-stg-secrets.
# Sync: make sync-stg-config (from .env). PG: CNPG @ data NS (phase ③); password = bifrost-postgres-app secret.
server:
  skip_monitor_ib: false
  architecture:
    monitor_port: 8765
    ops_port: 8768
    docs_port: 8767
  account:
    trading_port: 8769
    portfolio_port: 8771
  research:
    research_port: 8773
    market_port: 8772
    strategy_port: 8770
  feed:
    massive_port: 8766

sink: postgres

ib_operator:
  enabled: true
  stream: "ib:operator:cmd"
  consumer_group: ib-operator
  result_prefix: "ib:operator:result:"
  health_key: "bifrost:health:ws_ib_operator"
  result_ttl_sec: 300
  request_timeout_sec: 120
  bars_backfill_request_timeout_sec: 7200
  health_refresh_sec: 30
  max_result_bytes: 4194304
  block_ms: 5000
  use_for_celery_bars: true

ib_connection:
  reconnect_base_sec: 2
  reconnect_max_sec: 60
  reconnect_max_exp: 6
  ib_probe_interval_sec: 15
  ib_probe_stale_multiplier: 2.5

ib:
  connect_timeout: 60.0
  host:
    ip: 192.168.10.30
    port_type: tws_live
    client_id:
      daemon: 210
      listener: 201
      operator: 220
      worker_market: 240
      ingestor: 250
      account_agent: 260
  secondary:
    ip: 192.168.10.33
    port_type: tws_live
    client_id:
      listener: 202
      operator: 222
      account_agent: 262

utilized:
  services:
    server: stg
    massive: stg
    docs: stg
    ops: stg
    trading: stg
    strategy: stg
    portfolio: stg
    market: stg
    research: stg

postgres:
  host: bifrost-postgres-rw.data.svc.cluster.local
  port: 5432
  user: bifrost
  password: bifrost_stg
  database: bifrost_stg

redis:
  enabled: true
  host: redis-live-stg.data.svc.cluster.local
  port: 6379
  db: 0

redis_queue:
  enabled: true
  host: redis-queue-stg.data.svc.cluster.local
  port: 6379
  db: 0

# IBGP3 — shared Platform IB bus (ExternalName redis-ib → data NS). Password: make sync-redis-ib-secrets
redis_ib:
  enabled: true
  host: redis-ib
  port: 6379
  db: 0
  username: trade-prod
  password: "9934af40b9c34fe20bb227b1730dea1e"

ops:
  control_profile: stg
  # trade-celery-k8s-ideal W1: kubernetes executor scales Deployments (not subprocess in api-ops).
  project_root: /build/bifrost-trade-worker
  socket_project_root: /build/bifrost-trade-socket
  executor_mode: kubernetes
  kubernetes:
    namespace: bifrost-stg
  celery:
    prod_worker_hostnames:
      - celery-worker
  worker_profiles:
    stocks_ib:
      queues: ["stocks_ib"]
      max_worker_instances: 1
    options_massive:
      queues: ["options_massive"]
      pool: solo
      max_worker_instances: 2
    options_massive_high:
      queues: ["options_massive_high"]
      pool: solo
      max_worker_instances: 1
    stocks_massive:
      queues: ["stocks_massive"]
      pool: solo
      max_worker_instances: 2
    stocks_massive_high:
      queues: ["stocks_massive_high"]
      pool: solo
      max_worker_instances: 1
  auth:
    default_role: operator
    allow_unauthenticated_reads: false
    tokens: []
  audit:
    persist: true

# Prefer env MASSIVE_API_KEY / POLYGON_API_KEY from Secret in pods.
massive:
  api_key: ""
  tier: starter
  ws_url: wss://delayed.polygon.io/options
  features:
    trades_enabled: false
    ws_enabled: false  # Options Starter = REST aggregates via Celery; WS needs Developer+
